<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>征途：星火燎原——长征互动生存模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1e0505;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', 'Times New Roman', serif;
            padding: 12px;
            position: relative;
        }

        /* 星火背景 canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 30% 20%, #3a0c0c, #1a0303);
        }

        /* 主卡片——移动端优化，圆润紧凑 */
        .game-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(28, 8, 8, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            border: 1px solid rgba(200, 70, 45, 0.6);
            box-shadow: 0 12px 28px rgba(0,0,0,0.6), 0 0 0 1px rgba(180, 60, 30, 0.3) inset;
            overflow: hidden;
        }

        /* 头部——高度降低，紧凑但庄重 */
        .game-header {
            background: #8b1a1a;
            padding: 12px 12px 8px;
            text-align: center;
            border-bottom: 2px solid #e6b422;
        }

        .game-title {
            font-size: 1.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #FFDC8C;
            text-shadow: 0 1px 3px #3a0a0a;
            line-height: 1.2;
        }

        .game-sub {
            font-size: 0.7rem;
            color: #f7e0a0;
            margin-top: 4px;
            font-style: italic;
            border-top: 1px solid #c97e2c;
            display: inline-block;
            padding-top: 4px;
        }

        /* 状态栏——移动端换行良好 */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            background: #1f0c0cee;
            padding: 8px 12px;
            gap: 8px;
            border-bottom: 1px solid #a33b2b;
        }

        .stat {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 0.75rem;
            background: #2d1111;
            padding: 4px 0;
            border-radius: 40px;
            color: #ffcd94;
            box-shadow: inset 0 0 3px #5e1e1e, 0 1px 0 #a33b2b;
        }

        .stat span {
            display: block;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffbb66;
            line-height: 1.2;
        }

        /* 剧情区域——滚动支持，高度自适应 */
        .story-area {
            min-height: 240px;
            max-height: 55vh;
            overflow-y: auto;
            padding: 18px 18px 14px;
            background: rgba(20, 5, 5, 0.8);
            color: #f7e5cf;
            line-height: 1.5;
            font-size: 0.95rem;
            border-bottom: 1px solid #a0422c;
        }

        .chapter-name {
            display: inline-block;
            background: #b12b1c;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            color: #ffefb9;
        }

        .story-text {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
            text-shadow: 0 1px 1px rgba(0,0,0,0.4);
        }

        /* 选项区域——按钮明显，手指友好 */
        .options-area {
            padding: 16px 18px 22px;
            background: #1f0a0ad9;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #632020;
            border: 1px solid #c26a4a;
            color: #ffefcf;
            padding: 12px 14px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-family: inherit;
            letter-spacing: 0.3px;
            line-height: 1.3;
            min-height: 48px; /* 移动端触控区域 */
        }

        .option-btn:active {
            background: #9e3a2a;
            transform: scale(0.98);
        }

        .reset-btn {
            background: #411515;
            border: 1px solid #bc6f4b;
            color: #ffcf9a;
            padding: 10px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 6px;
            text-align: center;
            transition: 0.2s;
            font-weight: bold;
        }

        .reset-btn:active {
            background: #702a1a;
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 8px;
            background: #120404b3;
            color: #b97f5a;
        }

        /* 滚动条美观 */
        .story-area::-webkit-scrollbar {
            width: 4px;
        }
        .story-area::-webkit-scrollbar-track {
            background: #3a1a1a;
        }
        .story-area::-webkit-scrollbar-thumb {
            background: #b85c3a;
            border-radius: 4px;
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .game-title {
                font-size: 1.4rem;
            }
            .stat span {
                font-size: 1rem;
            }
            .option-btn {
                padding: 10px 12px;
                font-size: 0.85rem;
                min-height: 44px;
            }
            .story-area {
                padding: 14px;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="game-container" id="gameRoot">
    <div class="game-header">
        <div class="game-title">征途：星火燎原</div>
        <div class="game-sub">用脚步丈量信仰 · 用生命走向胜利</div>
    </div>
    <!-- 动态游戏内容区 -->
    <div id="gameDynamic"></div>
</div>

<script>
    // ----------------------------- 长征文字互动生存游戏核心逻辑 -----------------------------
    // 严格史实，无自动推进，所有玩家选择手动触发，最终导向胜利会师。
    // 四大数值：体力(Stamina) 意志(Morale) 信任(Trust) 物资(Supply)
    let gameState = {
        chapterId: "intro",        // 起始为介绍界面
        stats: {
            stamina: 80,
            morale: 70,
            trust: 50,
            supply: 40
        },
        flags: {
            savedXiaoLiu: false,
            sharedFood: false,
            helpedInSnow: false
        },
        gameOver: false,
        victory: false
    };

    // 辅助函数：数值钳制
    function clampStats() {
        let s = gameState.stats;
        s.stamina = Math.min(100, Math.max(0, s.stamina));
        s.morale = Math.min(100, Math.max(0, s.morale));
        s.trust = Math.min(100, Math.max(0, s.trust));
        s.supply = Math.min(100, Math.max(0, s.supply));
    }

    // 检测死亡结局（任一归零即失败）
    function checkDeadEnd() {
        const s = gameState.stats;
        if (gameState.gameOver) return true;
        if (s.stamina <= 0 || s.morale <= 0 || s.trust <= 0 || s.supply <= 0) {
            gameState.gameOver = true;
            gameState.victory = false;
            return true;
        }
        return false;
    }

    // 应用选择效果
    function applyChoice(effectFn) {
        if (gameState.gameOver || gameState.victory) return;
        const nextScene = effectFn(gameState);
        clampStats();
        if (checkDeadEnd()) {
            renderGame();
            return;
        }
        if (nextScene) {
            gameState.chapterId = nextScene;
            if (nextScene === "finalVictory") {
                gameState.victory = true;
                gameState.gameOver = false;
            }
            renderGame();
        } else {
            renderGame();
        }
    }

    // 重置游戏
    function resetGame() {
        gameState = {
            chapterId: "startChapter",  // 重置后直接进入第一章（跳过intro也可，但为了让新玩家看到规则，保留intro入口，reset时回到intro？为了方便，重置到intro让玩家再看设定也可以，但玩家熟悉后可快速开始。为了更好的体验，重置到intro介绍界面）
            stats: { stamina: 80, morale: 70, trust: 50, supply: 40 },
            flags: { savedXiaoLiu: false, sharedFood: false, helpedInSnow: false },
            gameOver: false,
            victory: false
        };
        clampStats();
        // 重置到介绍界面，让新玩家了解设定（完全符合“开局解释各种设定”）
        gameState.chapterId = "intro";
        renderGame();
    }

    // ---------- 场景库 (严格长征主要节点，真实历史，所有分支最终导向会宁会师) ----------
    const scenes = {
        intro: {
            title: "★ 燎原星火 · 征途启程 ★",
            desc: "中央红军第五次反“围剿”失利，1934年10月，8.6万将士告别瑞金、于都河，踏上两万五千里战略转移。\n\n你将扮演一名17岁的小战士“小山”，亲历湘江血战、遵义会议、四渡赤水、雪山草地，直至会宁大会师。\n\n【核心生存规则】\n▶ 体力：行军战斗之本，耗尽则倒在路上\n▶ 意志：信仰与士气，崩溃则脱离队伍\n▶ 信任：战友的依靠，过低将被孤立\n▶ 物资：粮食弹药，断绝即绝境\n\n每一个抉择都将影响数值与战友命运，但无论如何，历史必然走向胜利会师。\n\n“红军不怕远征难，万水千山只等闲。”\n\n请做出你的选择——",
            options: [
                { text: "🔥 踏上征途 · 铭记历史 🔥", next: "startChapter" }
            ]
        },
        // 第一章 告别于都河
        startChapter: {
            title: "第一章 · 告别于都河",
            desc: "1934年10月，江西于都。秋风萧瑟，火把如龙。你和老赵、小刘随部队夜渡于都河。百姓送来草鞋、红薯，一位老大娘含泪塞给你两个红薯。你发现自己的米袋比别人的鼓——那是已故母亲偷偷多存的几把米。",
            options: [
                { text: "与最瘦弱的小刘分享粮食 → 物资-5，信任+10，意志+5", effect: (gs) => { gs.stats.supply -= 5; gs.stats.trust += 10; gs.stats.morale += 5; gs.flags.sharedFood = true; return "xiangjiang"; } },
                { text: "交给班长统一分配 → 物资-3，信任+8，意志+3", effect: (gs) => { gs.stats.supply -= 3; gs.stats.trust += 8; gs.stats.morale += 3; return "xiangjiang"; } },
                { text: "独自保留，活下去要紧 → 信任-5，意志-2", effect: (gs) => { gs.stats.trust -= 5; gs.stats.morale -= 2; return "xiangjiang"; } }
            ]
        },
        // 湘江血战
        xiangjiang: {
            title: "第二章 · 血战湘江",
            desc: "1934年11月底，湘江两岸。敌军重兵夹击，天上飞机轰炸。你的连队坚守渡口，战友不断倒下。班长老赵中弹倒地，小刘吓得发抖。江水被染红，每寸土地都在燃烧。",
            options: [
                { text: "冒死背起老赵撤退 → 体力-15，意志+10，信任+12", effect: (gs) => { gs.stats.stamina -= 15; gs.stats.morale += 10; gs.stats.trust += 12; return "zunyi"; } },
                { text: "就地掩护，让老赵自己爬 → 体力-5，意志-5，信任-5", effect: (gs) => { gs.stats.stamina -= 5; gs.stats.morale -= 5; gs.stats.trust -= 5; return "zunyi"; } },
                { text: "服从命令继续射击 → 意志-2，信任+2，体力-5", effect: (gs) => { gs.stats.stamina -= 5; gs.stats.morale -= 2; gs.stats.trust += 2; return "zunyi"; } }
            ]
        },
        // 遵义会议
        zunyi: {
            title: "第三章 · 遵义会议 · 伟大转折",
            desc: "1935年1月，红军攻占遵义，获得休整。中央召开政治局扩大会议，确立了毛泽东的领导地位。你在城外听闻消息，士气大振。这几天你可以做些事。",
            options: [
                { text: "协助宣传队写标语 → 信任+8，意志+5", effect: (gs) => { gs.stats.trust += 8; gs.stats.morale += 5; return "chishui"; } },
                { text: "帮老乡挑水劈柴 → 信任+12，物资+3", effect: (gs) => { gs.stats.trust += 12; gs.stats.supply += 3; return "chishui"; } },
                { text: "抓紧时间练枪法 → 体力+5，意志+3", effect: (gs) => { gs.stats.stamina += 5; gs.stats.morale += 3; return "chishui"; } }
            ]
        },
        // 四渡赤水
        chishui: {
            title: "第四章 · 四渡赤水 · 用兵如神",
            desc: "1935年1-4月，红军在赤水河来回穿插，几十万敌军被调来调去。连续行军三天三夜，你看见小刘摇摇欲坠。娄山关大捷振奋人心。",
            options: [
                { text: "背着小刘行军 → 体力-12，信任+15，意志+10", effect: (gs) => { gs.stats.stamina -= 12; gs.stats.trust += 15; gs.stats.morale += 10; gs.flags.savedXiaoLiu = true; return "daduhe"; } },
                { text: "搀扶着他，请求战友协助 → 体力-5，信任+8，意志+5", effect: (gs) => { gs.stats.stamina -= 5; gs.stats.trust += 8; gs.stats.morale += 5; return "daduhe"; } },
                { text: "让他抓住马尾巴省力 → 体力-2，信任+2", effect: (gs) => { gs.stats.stamina -= 2; gs.stats.trust += 2; return "daduhe"; } }
            ]
        },
        // 强渡大渡河·飞夺泸定桥
        daduhe: {
            title: "第五章 · 大渡桥横 · 飞夺天险",
            desc: "1935年5月，大渡河天险，蒋介石妄想使红军成为“石达开第二”。安顺场十七勇士强渡成功，另一路红四团昼夜240里奔袭泸定桥。你随突击队预备队抵达，铁索桥上敌人机枪狂扫。",
            options: [
                { text: "报名参加夺桥突击队！ → 体力-20，意志+20，信任+15", effect: (gs) => { gs.stats.stamina -= 20; gs.stats.morale += 20; gs.stats.trust += 15; return "xueshan"; } },
                { text: "桥头火力掩护战友 → 体力-5，意志+8，信任+8", effect: (gs) => { gs.stats.stamina -= 5; gs.stats.morale += 8; gs.stats.trust += 8; return "xueshan"; } },
                { text: "负责运送伤员 → 体力-8，信任+12，意志+5", effect: (gs) => { gs.stats.stamina -= 8; gs.stats.trust += 12; gs.stats.morale += 5; return "xueshan"; } }
            ]
        },
        // 翻越夹金山
        xueshan: {
            title: "第六章 · 雪山忠骨 · 翻越夹金山",
            desc: "1935年6月，海拔4000多米夹金山，空气稀薄，风雪如刀。很多战友坐下就再没起来。半山腰一名重伤员请求放下他，你的身体也近乎冻僵。",
            options: [
                { text: "坚持用担架抬伤员翻山 → 体力-15，意志+15，信任+12", effect: (gs) => { gs.stats.stamina -= 15; gs.stats.morale += 15; gs.stats.trust += 12; gs.flags.helpedInSnow = true; return "caodi"; } },
                { text: "留下毯子盖在他身上，尊重意愿 → 物资-5，意志+5，信任+5", effect: (gs) => { gs.stats.supply -= 5; gs.stats.morale += 5; gs.stats.trust += 5; return "caodi"; } },
                { text: "服从命令，含泪前进 → 意志-5，信任-3", effect: (gs) => { gs.stats.morale -= 5; gs.stats.trust -= 3; return "caodi"; } }
            ]
        },
        // 松潘草地
        caodi: {
            title: "第七章 · 草地炼狱 · 生死七天",
            desc: "1935年8月，松潘草地，沼泽遍布，断粮多日。野菜草根吃光，皮带煮烂。小刘已经两天没吃东西，你只剩最后一把青稞。",
            options: [
                { text: "把青稞全部塞给小刘 → 物资-8，体力-5，信任+18，意志+12", effect: (gs) => { gs.stats.supply = Math.max(0, gs.stats.supply-8); gs.stats.stamina -= 5; gs.stats.trust += 18; gs.stats.morale += 12; return "lazikou"; } },
                { text: "分一半给他，同甘共苦 → 物资-4，体力-3，信任+12，意志+8", effect: (gs) => { gs.stats.supply -= 4; gs.stats.stamina -= 3; gs.stats.trust += 12; gs.stats.morale += 8; return "lazikou"; } },
                { text: "自己吃掉保存体力 → 体力+5，信任-12，意志-8", effect: (gs) => { gs.stats.stamina += 5; gs.stats.trust -= 12; gs.stats.morale -= 8; return "lazikou"; } }
            ]
        },
        // 腊子口
        lazikou: {
            title: "第八章 · 天险腊子口 · 突破封锁",
            desc: "1935年9月，走出草地后腊子口挡道。敌军据守险隘，正面强攻难克。部队招募敢死队攀爬绝壁迂回。",
            options: [
                { text: "报名敢死队，攀岩夜袭 → 体力-12，意志+18，信任+10", effect: (gs) => { gs.stats.stamina -= 12; gs.stats.morale += 18; gs.stats.trust += 10; return "wuqizhen"; } },
                { text: "正面佯攻，吸引火力 → 体力-8，意志+6，信任+6", effect: (gs) => { gs.stats.stamina -= 8; gs.stats.morale += 6; gs.stats.trust += 6; return "wuqizhen"; } },
                { text: "运送弹药伤员 → 体力-5，信任+10，意志+4", effect: (gs) => { gs.stats.stamina -= 5; gs.stats.trust += 10; gs.stats.morale += 4; return "wuqizhen"; } }
            ]
        },
        // 抵达吴起镇
        wuqizhen: {
            title: "第九章 · 吴起镇会师 · 奠基西北",
            desc: "1935年10月，中央红军翻越六盘山，抵达陕北吴起镇。与陕北红军会师时，你们衣衫褴褛却紧紧拥抱。你的连队从百余人仅剩不到20人。百姓送来热饭棉衣。",
            options: [
                { text: "将棉袄让给小刘 → 信任+8，意志+10", effect: (gs) => { gs.stats.trust += 8; gs.stats.morale += 10; return "huining"; } },
                { text: "和战友分着盖 → 信任+12，意志+5", effect: (gs) => { gs.stats.trust += 12; gs.stats.morale += 5; return "huining"; } },
                { text: "给牺牲战友写家信 → 意志+8", effect: (gs) => { gs.stats.morale += 8; return "huining"; } }
            ]
        },
        // 会宁大会师
        huining: {
            title: "终章 · 三军大会师 · 红星照耀中国",
            desc: "1936年10月，甘肃会宁。红一、红二、红四方面军历经千难万险胜利会师。你站在城墙上，回望两万五千里血与火。战友们互相拥抱，有人问：你后悔吗？",
            options: [
                { text: "“为了信仰与胜利，死而无憾！” → 星火结局", effect: (gs) => { gs.stats.morale = 100; return "finalVictory"; } },
                { text: "“替牺牲的兄弟们看到了胜利，值了。” → 传承结局", effect: (gs) => { gs.stats.trust += 10; return "finalVictory"; } },
                { text: "“走下去，奔赴抗日战场！” → 基石结局", effect: (gs) => { gs.stats.stamina += 5; return "finalVictory"; } }
            ]
        },
        finalVictory: {
            title: "★ 长征胜利 · 星火燎原 ★",
            desc: "1936年10月，三大主力会宁会师，长征胜利结束！\n\n你用脚步丈量信仰，用生命走向胜利。两万五千里，每一寸土地都浸染着红军的鲜血与理想。你的名字或许无人知晓，但你的功勋永载史册。\n\n“雄关漫道真如铁，而今迈步从头越。”\n\n感谢你走完这段征途，可以选择重新开始，体验不同的抉择之路。",
            options: [
                { text: "🔥 重走长征路 🔥", next: "resetAction" }
            ]
        }
    };

    // 渲染游戏主界面
    function renderGame() {
        const container = document.getElementById("gameDynamic");
        if (!container) return;

        // 死亡结局展示
        if (gameState.gameOver && !gameState.victory) {
            let deathMsg = "";
            if (gameState.stats.stamina <= 0) deathMsg = "体力耗尽，你永远倒在了雪山/草地中……但红军主力继续向前，最终迎来胜利。";
            else if (gameState.stats.morale <= 0) deathMsg = "意志崩溃，你脱离了队伍……多数战友坚持到底，走向会宁。";
            else if (gameState.stats.trust <= 0) deathMsg = "信任丧失，你被孤立掉队……但团结的队伍最终胜利会师。";
            else if (gameState.stats.supply <= 0) deathMsg = "断粮绝境，你没有挺过饥饿……然而红军突破了天险，到达陕北。";
            else deathMsg = "征途未竟，但你的牺牲铸就了丰碑。";

            container.innerHTML = `
                <div class="stats-panel">
                    <div class="stat">体力<span>${Math.max(0, gameState.stats.stamina)}</span></div>
                    <div class="stat">意志<span>${Math.max(0, gameState.stats.morale)}</span></div>
                    <div class="stat">信任<span>${Math.max(0, gameState.stats.trust)}</span></div>
                    <div class="stat">物资<span>${Math.max(0, gameState.stats.supply)}</span></div>
                </div>
                <div class="story-area">
                    <div class="chapter-name">⚰️ 征途未竟 ⚰️</div>
                    <div class="story-text">${deathMsg}<br><br>“为有牺牲多壮志，敢教日月换新天。”<br><br>长征依然胜利会师，但你的故事在此定格。</div>
                </div>
                <div class="options-area">
                    <button class="reset-btn" id="resetDeadBtn">🔁 重新开始征程</button>
                </div>
            `;
            document.getElementById("resetDeadBtn")?.addEventListener("click", () => resetGame());
            return;
        }

        // 胜利界面
        if (gameState.victory) {
            const vicScene = scenes.finalVictory;
            container.innerHTML = `
                <div class="stats-panel">
                    <div class="stat">体力<span>${gameState.stats.stamina}</span></div>
                    <div class="stat">意志<span>${gameState.stats.morale}</span></div>
                    <div class="stat">信任<span>${gameState.stats.trust}</span></div>
                    <div class="stat">物资<span>${gameState.stats.supply}</span></div>
                </div>
                <div class="story-area">
                    <div class="chapter-name">${vicScene.title}</div>
                    <div class="story-text">${vicScene.desc}</div>
                </div>
                <div class="options-area">
                    <button class="option-btn" data-reset="true">${vicScene.options[0].text}</button>
                </div>
            `;
            const resetBtn = container.querySelector(".option-btn");
            if (resetBtn) resetBtn.addEventListener("click", () => resetGame());
            return;
        }

        // 正常剧情场景
        let sceneId = gameState.chapterId;
        const scene = scenes[sceneId];
        if (!scene) {
            resetGame();
            return;
        }

        let optionsHtml = "";
        for (let i = 0; i < scene.options.length; i++) {
            const opt = scene.options[i];
            if (opt.next === "resetAction") {
                optionsHtml += `<button class="option-btn" data-reset="true">${opt.text}</button>`;
            } else {
                optionsHtml += `<button class="option-btn" data-choice-index="${i}">${opt.text}</button>`;
            }
        }

        container.innerHTML = `
            <div class="stats-panel">
                <div class="stat">体力<span>${gameState.stats.stamina}</span></div>
                <div class="stat">意志<span>${gameState.stats.morale}</span></div>
                <div class="stat">信任<span>${gameState.stats.trust}</span></div>
                <div class="stat">物资<span>${gameState.stats.supply}</span></div>
            </div>
            <div class="story-area">
                <div class="chapter-name">${scene.title}</div>
                <div class="story-text">${scene.desc}</div>
            </div>
            <div class="options-area">
                ${optionsHtml}
                <button class="reset-btn" id="globalResetBtn">⚙️ 重走长征路</button>
            </div>
        `;

        // 绑定选项事件
        for (let i = 0; i < scene.options.length; i++) {
            const opt = scene.options[i];
            if (opt.next === "resetAction") {
                const btn = container.querySelector(`.option-btn[data-reset="true"]`);
                if (btn) btn.addEventListener("click", () => resetGame());
                continue;
            }
            const btn = container.querySelector(`.option-btn[data-choice-index="${i}"]`);
            if (btn) {
                btn.addEventListener("click", () => {
                    if (opt.effect) {
                        applyChoice(opt.effect);
                    } else if (opt.next) {
                        gameState.chapterId = opt.next;
                        renderGame();
                    }
                });
            }
        }
        const resetBtn = document.getElementById("globalResetBtn");
        if (resetBtn) resetBtn.addEventListener("click", () => resetGame());
    }

    // 动态背景（星火效果，适应移动端）
    function initDynamicBg() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Spark {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 2 + 1;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = `rgba(220, 80, 40, ${this.opacity})`;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < -10) {
                    this.y = height + 5;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }
        for (let i = 0; i < 160; i++) particles.push(new Spark());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "#1a0303";
            ctx.fillRect(0, 0, width, height);
            for (let p of particles) {
                p.update();
                p.draw();
            }
            // 暗红山脉轮廓
            ctx.fillStyle = "#2e0c0caa";
            ctx.beginPath();
            ctx.moveTo(0, height - 70);
            for (let x = 0; x < width; x += 50) {
                ctx.lineTo(x, height - 60 + Math.sin(x * 0.008) * 18);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fill();
            requestAnimationFrame(animate);
        }
        animate();
    }

    // 启动游戏
    window.onload = () => {
        initDynamicBg();
        resetGame();  // 调用reset会设置到intro并展示完整的设定说明
    };
</script>
</body>
</html>
